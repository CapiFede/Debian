# Impide que el driver de WiFi mt76x2u se apodere del dongle inalámbrico de Xbox.
#
# El "Xbox Wireless Adapter" (045e:02fe) lleva por dentro un chip WiFi MediaTek
# MT76x2. El driver mt76x2u del kernel lo reconoce y agarra el dongle ANTES que
# xone, así que el control nunca llega a hacer pairing. Bloqueando mt76x2u, el
# dongle queda libre para que lo tome xone (instalado vía paquete AUR xone-dkms).
#
# Seguro en esta PC: el WiFi real es wlan0 (mt7921e, placa PCIe); mt76x2u solo
# servía para robar el dongle. Si en el futuro usás un WiFi USB MT76x2, revisá.
blacklist mt76x2u
